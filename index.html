<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escáner - Día del Conductor</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:linear-gradient(
        180deg,
        #EEF4FB,
        #FFFFFF
    );

    min-height:100vh;

}

header{
background:#ffffff;
padding:25px 20px;
text-align:center;
border-bottom:5px solid #F39C12;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.logo{

    width:240px;

    max-width:85%;

    display:block;

    margin:auto;

}

header h1{
color:#202A72;
font-size:32px;
font-weight:700;
margin-top:18px;
}

header p{
color:#F39C12;
margin-top:6px;
font-size:18px;
font-weight:600;
}
.card{

    width:92%;

    max-width:600px;

    margin:30px auto;

    background:white;

    border-radius:22px;

    padding:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.12);

}

.card h2{

    color:#202A72;

    margin-bottom:20px;

    font-size:28px;

}

#reader{

    width:100%;

    overflow:hidden;

    border-radius:18px;

    border:5px solid #F28C28;

}

#estado{
margin-top:22px;
padding:18px;
background:#ffffff;
border-left:6px solid #2E7D32;
border-radius:12px;
font-size:21px;
font-weight:700;
color:#202A72;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

footer{

    margin-top:30px;

    text-align:center;

    color:#777;

    font-size:14px;

}

</style>

</head>

<body>

<header>

    <img src="img/soluciones en movimiento.png" class="logo">

    <h1>Escáner Logístico</h1>

    <p>Día del Conductor 2026</p>

</header>

<div class="card">

    <h2>Control de ingreso</h2>

    <div id="reader"></div>

   <div id="estado">
🟢 Listo para escanear
</div>

</div>

<footer>

AS TRANSPORTES © 2026

</footer>

<script>

const scanner = new Html5Qrcode("reader");

scanner.start(
    {
        facingMode:"environment"
    },
    {
        fps:10,
        qrbox:250
    },
    function(decodedText){

        document.getElementById("estado").innerHTML =
        "🟠 Procesando...";

        scanner.stop();

        window.location.href = decodedText;

    },
    function(error){}

).catch(function(err){

    document.getElementById("estado").innerHTML =
    "❌ " + err;

});

</script>

</body>
</html>
